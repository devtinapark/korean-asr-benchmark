# Korean ASR Benchmark Configuration
# Tests top 5 models on your own kitchen audio samples — no large dataset downloads required

benchmark:
  language: "ko_kr"
  device: "cpu"  # change to "mps" for Apple Silicon

# Your kitchen audio clips go here
dataset:
  audio_dir: "kitchen_samples/audio"
  transcripts_dir: "kitchen_samples/transcriptions"
  metadata_file: "kitchen_samples/metadata.json"

# Top 5 models selected from existing leaderboards (see README for sources)
models:

  # --- API models: no download needed, just set env vars ---

  openai-whisper-api:
    type: "api"
    provider: "openai"
    model: "whisper-1"
    language: "ko"
    # export OPENAI_API_KEY=your_key

  google-speech:
    type: "api"
    provider: "google"
    language: "ko-KR"
    # export GOOGLE_APPLICATION_CREDENTIALS=/path/to/credentials.json

  clova-speech:
    type: "api"
    provider: "naver"
    language: "Kor"
    # export NAVER_CLIENT_ID=your_id
    # export NAVER_CLIENT_SECRET=your_secret

  # --- Local models: require disk space ---

  whisper-large-v3:
    type: "local"
    name: "openai/whisper-large-v3"
    language: "korean"
    # ~3GB download — skip if low on disk

  wav2vec2-korean:
    type: "local"
    name: "kresnik/wav2vec2-large-xlsr-korean"
    # ~1.3GB download

metrics:
  compute_cer: true
  compute_wer: true
  loanword_detection: true

output:
  results_dir: "results"
  save_predictions: true
  generate_report: true
